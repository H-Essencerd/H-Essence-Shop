<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* USA TU CONFIG QUE YA TENIAS */
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_AUTH_DOMAIN",
  projectId: "TU_PROJECT_ID",
  storageBucket: "TU_STORAGE",
  messagingSenderId: "TU_MSG_ID",
  appId: "TU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const firestore = getFirestore(app);
const DB_REF = doc(firestore,"tienda","datos");

/* BASE DE DATOS */
let db = {
  productos:[],
  nombreTienda:"H-ESSENCE",
  slogan:"Luxury Perfumery",
  logo:""
};

let esAdmin=false;
let currentImg="";

/* GUARDAR EN NUBE */
async function guardarTodo(){
  await setDoc(DB_REF,db);
}

/* CARGAR DE NUBE */
async function cargarTodo(){
  const snap=await getDoc(DB_REF);
  if(snap.exists()){
    db=snap.data();
  }
}

/* HEADER */
function actualizarHeader(){

  document.getElementById("shop-name-display").innerText=db.nombreTienda;
  document.getElementById("shop-slogan-display").innerText=db.slogan;

  if(db.logo){
    const logo=document.getElementById("shop-logo-header");
    logo.src=db.logo;
    logo.style.display="block";
  }

}

/* SUBIR LOGO */
function subirLogo(file){

  const reader=new FileReader();

  reader.onload=e=>{
    db.logo=e.target.result;
    guardarTodo();
    actualizarHeader();
  };

  reader.readAsDataURL(file);

}

/* AGREGAR O EDITAR PRODUCTO */
function procesarProducto(){

  const id=document.getElementById("edit-id").value;

  const producto={
    id:id?parseInt(id):Date.now(),
    ref:document.getElementById("referencia").value,
    nombre:document.getElementById("nombre").value,
    onzas:document.getElementById("onzas").value,
    venta:parseFloat(document.getElementById("venta").value)||0,
    costo:parseFloat(document.getElementById("costo").value)||0,
    stock:parseInt(document.getElementById("stock-cantidad").value)||0,
    img:currentImg||"https://via.placeholder.com/300"
  };

  if(!producto.nombre){
    alert("Debes poner nombre");
    return;
  }

  if(id){
    const index=db.productos.findIndex(p=>p.id==producto.id);
    db.productos[index]=producto;
  }else{
    db.productos.push(producto);
  }

  guardarTodo();
  render();
  limpiarForm();

}

/* BORRAR */
function borrar(id){

  if(!confirm("Eliminar producto?")) return;

  db.productos=db.productos.filter(p=>p.id!==id);

  guardarTodo();
  render();

}

/* EDITAR */
function editar(id){

  const p=db.productos.find(p=>p.id==id);

  document.getElementById("edit-id").value=p.id;
  document.getElementById("referencia").value=p.ref;
  document.getElementById("nombre").value=p.nombre;
  document.getElementById("onzas").value=p.onzas;
  document.getElementById("venta").value=p.venta;
  document.getElementById("costo").value=p.costo;
  document.getElementById("stock-cantidad").value=p.stock;

  currentImg=p.img;

}

/* RENDER PRODUCTOS */
function render(){

  const tabla=document.getElementById("tabla-body");
  const catalogo=document.getElementById("catalogo-container");

  tabla.innerHTML="";
  catalogo.innerHTML="";

  db.productos.forEach(p=>{

    const ganancia=p.venta-p.costo;

    tabla.innerHTML+=`
    <tr>
      <td>${p.ref}</td>
      <td>${p.nombre}</td>
      <td>${p.onzas}</td>
      <td>${p.stock}</td>
      <td>${p.costo}</td>
      <td>${p.venta}</td>
      <td>${ganancia}</td>
      <td>
        <button onclick="editar(${p.id})">✏️</button>
        <button onclick="borrar(${p.id})">🗑️</button>
      </td>
    </tr>
    `;

    catalogo.innerHTML+=`
    <div class="card">
      <img src="${p.img}">
      <h3>${p.nombre}</h3>
      <p style="font-weight:bold;color:gold;">RD$ ${p.venta}</p>
      <a href="https://wa.me/18097530456?text=Hola quiero ${p.nombre}">
      Comprar
      </a>
    </div>
    `;

  });

}

/* CAMBIAR VISTA */
function cambiarVista(){

  esAdmin=!esAdmin;

  document.getElementById("panel-admin")
  .classList.toggle("hidden",!esAdmin);

  document.getElementById("seccion-cliente")
  .classList.toggle("hidden",esAdmin);

}

/* LIMPIAR FORM */
function limpiarForm(){

  document.getElementById("edit-id").value="";
  document.getElementById("referencia").value="";
  document.getElementById("nombre").value="";
  document.getElementById("onzas").value="";
  document.getElementById("venta").value="";
  document.getElementById("costo").value="";
  document.getElementById("stock-cantidad").value="1";

  currentImg="";

}

/* INICIO */
window.addEventListener("load",async()=>{

  await cargarTodo();

  actualizarHeader();

  render();

});

/* EXPONER FUNCIONES */
window.procesarProducto=procesarProducto;
window.borrar=borrar;
window.editar=editar;
window.cambiarVista=cambiarVista;
window.subirLogo=subirLogo;

</script>
